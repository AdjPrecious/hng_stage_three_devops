# nginx.conf — Reverse proxy for Nextcloud with JSON access logging
# Writes structured JSON logs to /var/log/nginx/hng-access.log
# Shares logs via the HNG-nginx-logs Docker named volume

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

nginx:
  log_path: "/var/log/nginx/hng-access.log"
events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # JSON access log format
    # Required fields: source_ip, timestamp, method, path, status, response_size
    # -----------------------------------------------------------------------
    log_format hng_json escape=json
    '{'
        '"source_ip":"$http_x_forwarded_for",'
        '"real_ip":"$remote_addr",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_host":"$host",'
        '"user_agent":"$http_user_agent"'
    '}';

    # Write JSON logs to the shared volume path
    access_log  /var/log/nginx/hng-access.log  hng_json;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 512M;

    # -----------------------------------------------------------------------
    # Trust and forward the real client IP via X-Forwarded-For
    # Add your cloud provider's IP ranges here if behind a load balancer.
    # -----------------------------------------------------------------------
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # -----------------------------------------------------------------------
    # Upstream: Nextcloud container
    # -----------------------------------------------------------------------
    upstream nextcloud {
        server nextcloud:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";

        # Pass real client IP to Nextcloud
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Large file upload support
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        location / {
            proxy_pass http://nextcloud;

            # Required for Nextcloud WebDAV
            proxy_set_header  Destination $http_destination;
            proxy_set_header  Overwrite    $http_overwrite;

            # Nextcloud-specific headers
            add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;
        }

        # Health check endpoint (not proxied to Nextcloud)
        location /_nginx_health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
